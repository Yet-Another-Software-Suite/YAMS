name: Build Examples

on:
  push:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-examples:
    name: Build Examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - name: Install roboRIOToolchain
        working-directory: vendordep
        run: chmod a+x gradlew && ./gradlew installRoboRioToolchain
      - name: Build examples
        run: mkdir generated && make && make build
        working-directory: examples
