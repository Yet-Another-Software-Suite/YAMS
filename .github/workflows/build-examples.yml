name: Build Examples

on:
  push:
    branches: [ "master" ]
    paths:
      - "examples/**"
      - "yams/**"
  pull_request:
    paths:
      - "examples/**"
      - "yams/**"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-examples:
    name: Build Examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v6
      - name: Install roboRIOToolchain
        working-directory: vendordep
        run: chmod a+x gradlew && ./gradlew installRoboRioToolchain
      - name: Build java examples
        run: mkdir generated && make && make build
        working-directory: examples
      - name: Build C++ example
        run: ./gradlew build
        working-directory: examples/cpptest
        continue-on-error: true
