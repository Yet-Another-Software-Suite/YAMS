name: Build and Release
on:
  workflow_dispatch:
    inputs:
      releaseVersion:
        description: "Release version number"
        type: string
        required: true
      publish:
        type: boolean
        description: "Publish to WPILib"
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-cross:
    name: Release - ${{ matrix.artifact-name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - container: wpilib/roborio-cross-ubuntu:2025-22.04
            artifact-name: athena
            build-options: "-Ponlylinuxathena"
          - container: wpilib/raspbian-cross-ubuntu:bookworm-22.04
            artifact-name: arm32
            build-options: "-Ponlylinuxarm32"
          - container: wpilib/aarch64-cross-ubuntu:bookworm-22.04
            artifact-name: arm64
            build-options: "-Ponlylinuxarm64"
    runs-on: ubuntu-22.04
    container: ${{ matrix.container }}
    env:
      releaseVersion: ${{ inputs.releaseVersion }}
    steps:
      - uses: actions/checkout@v7
      - name: Configure git safe directory
        run: git config --global --add safe.directory /__w/${{ github.event.repository.name }}/${{ github.event.repository.name }}
      - name: Publish
        run: ./gradlew publish ${{ matrix.build-options }}
        working-directory: vendordep
      - uses: actions/upload-artifact@v7
        with:
          name: maven-${{ matrix.artifact-name }}
          path: vendordep/build/maven/

  build-host:
    name: Release - ${{ matrix.artifact-name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact-name: windows
            gradlew: ./gradlew.bat
            toolchain-path: C:/Users/Public/wpilib/2026/roborio
          - os: macos-latest
            artifact-name: macos
            gradlew: ./gradlew
            toolchain-path: ~/wpilib/2026/roborio
    runs-on: ${{ matrix.os }}
    env:
      releaseVersion: ${{ inputs.releaseVersion }}
    defaults:
      run:
        working-directory: vendordep
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Make gradlew executable
        if: runner.os != 'Windows'
        run: chmod +x gradlew
      - name: Cache roboRIO toolchain
        id: toolchain-cache
        uses: actions/cache@v4
        with:
          path: ${{ matrix.toolchain-path }}
          key: roborio-toolchain-${{ matrix.artifact-name }}
      - uses: gradle/actions/setup-gradle@v6
      - name: Install roboRIO toolchain
        if: steps.toolchain-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          for i in 1 2 3; do
            ./gradlew installRoboRioToolchain && break
            echo "Attempt $i failed, retrying in 15s..."
            sleep 5
          done
      - name: Publish
        run: ${{ matrix.gradlew }} publish
      - uses: actions/upload-artifact@v7
        with:
          name: maven-${{ matrix.artifact-name }}
          path: vendordep/build/maven/

  build-examples:
    name: Release - Examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Generate Java examples
        run: mkdir -p generated && make
        working-directory: examples
      - name: Zip generated Java examples
        run: |
          mkdir -p ${{ github.workspace }}/example-artifacts
          for dir in examples/generated/*/; do
            name=$(basename "$dir")
            zip -r "${{ github.workspace }}/example-artifacts/example-${name}.zip" "$dir"
          done
      - name: Zip C++ example
        run: zip -r ${{ github.workspace }}/example-artifacts/example-cpptest.zip examples/cpptest/ -x "examples/cpptest/.gradle/*" -x "examples/cpptest/build/*"
      - uses: actions/upload-artifact@v7
        with:
          name: release-examples
          path: example-artifacts/

  release:
    name: Release - Linux (publish)
    needs: [build-cross, build-host, build-examples]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
      pages: write
      deployments: read
      id-token: write
    env:
      releaseVersion: ${{ inputs.releaseVersion }}
      workingDirectory: ${{ github.workspace }}/vendordep
    environment:
      name: github-pages
    steps:
      - run: git config --global user.name "thenetworkgrinch" && git config --global user.email "thenetworkgrinch@noreply.users.github.com"

      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - run: chmod +x gradlew
        working-directory: ${{ env.workingDirectory }}

      - name: Install doxygen and graphviz
        run: sudo apt-get install -y doxygen graphviz

      - name: Cache roboRIO toolchain
        id: toolchain-cache
        uses: actions/cache@v4
        with:
          path: ~/wpilib/2026/roborio
          key: roborio-toolchain-linux

      - uses: gradle/actions/setup-gradle@v6

      - name: Install roboRIO toolchain
        if: steps.toolchain-cache.outputs.cache-hit != 'true'
        shell: bash
        working-directory: ${{ env.workingDirectory }}
        run: |
          for i in 1 2 3; do
            ./gradlew installRoboRioToolchain && break
            echo "Attempt $i failed, retrying in 15s..."
            sleep 5
          done

      - name: Create and push release tag
        run: |
          git tag v${{ inputs.releaseVersion }} ${{ github.sha }}
          git push origin v${{ inputs.releaseVersion }}

      - name: Download cross-platform maven artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: maven-*
          path: cross/
          merge-multiple: false

      # Pass 1: publish into a clean directory so the offline zip contains only
      # the current version's artifacts with correctly stitched metadata.
      - name: Merge cross-platform artifacts (pass 1 — clean dir)
        run: |
          mkdir -p vendordep/build/maven
          for dir in cross/maven-*/; do
            cp -r "$dir." vendordep/build/maven/
          done

      - name: Build and publish — stitch current version maven metadata
        run: ./gradlew publish
        working-directory: ${{ env.workingDirectory }}

      - name: Download example artifacts
        uses: actions/download-artifact@v7
        with:
          name: release-examples
          path: release-artifacts/

      - name: Zip current version maven for offline installation
        run: |
          cd ${{ env.workingDirectory }}/build
          zip -r ${{ github.workspace }}/release-artifacts/${{ inputs.releaseVersion }}-YAMS-Offline.zip maven/

      # Pass 2: rebuild on top of the full gh-pages history so the deployed
      # maven metadata covers all versions, not just the current one.
      - name: Clean maven directory for gh-pages checkout
        run: rm -rf ${{ env.workingDirectory }}/build/maven/

      - name: Checkout gh-pages branch
        uses: actions/checkout@v7
        with:
          ref: gh-pages
          path: ${{ env.workingDirectory }}/build/maven/

      - name: Merge cross-platform artifacts (pass 2 — full history)
        run: |
          for dir in cross/maven-*/; do
            cp -r "$dir." vendordep/build/maven/
          done

      - name: Build and publish (Linux — fixes maven metadata for all versions)
        run: ./gradlew publish
        working-directory: ${{ env.workingDirectory }}

      - name: Create versioned vendordep JSON
        run: cp ${{ env.workingDirectory }}/build/maven/yams.json ${{ env.workingDirectory }}/build/maven/yams-${{ inputs.releaseVersion }}.json

      - name: Push to gh-pages
        run: git add . && git commit -m "Automatically add YAMS version ${{ inputs.releaseVersion }}" && git push
        working-directory: ${{ env.workingDirectory }}/build/maven/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v4
        with:
          name: github-pages
          retention-days: '90'
          path: ${{ env.workingDirectory }}/build/maven/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Output Pages Tree
        run: find ${{ env.workingDirectory }}/build/maven/ -type f

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ inputs.publish }}" = "true" ]; then
            RELEASE_FLAGS="--latest"
          else
            RELEASE_FLAGS="--prerelease"
          fi
          gh release create "v${{ inputs.releaseVersion }}" \
            --title "YAMS v${{ inputs.releaseVersion }}" \
            --generate-notes \
            $RELEASE_FLAGS \
            release-artifacts/*

      - name: Create Vendor JSON Repo PR
        if: ${{ inputs.publish == true }}
        uses: wpilibsuite/vendor-json-repo/.github/actions/add_vendordep@main
        with:
          repo: Yet-Another-Software-Suite/vendor-json-repo
          token: ${{ secrets.PUBLISH_VENDOR_JSON_TOKEN }}
          vendordep_file: ${{ env.workingDirectory }}/build/maven/yams-${{ inputs.releaseVersion }}.json
          pr_title: "Automatically add YAMS version ${{ inputs.releaseVersion }}"
          pr_branch: "publish_yams_${{ inputs.releaseVersion }}"
        continue-on-error: true
