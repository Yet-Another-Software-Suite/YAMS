name: Build and Release
on:
  workflow_dispatch:
    inputs:
      releaseVersion:
        description: "Release version number"
        type: string
        required: true
      publish:
        type: boolean
        description: "Publish to WPILib"
        default: false

jobs:
  build-cross:
    name: Release - ${{ matrix.artifact-name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - container: wpilib/roborio-cross-ubuntu:2026-22.04
            artifact-name: athena
            build-options: "-Ponlylinuxathena"
          - container: wpilib/raspbian-cross-ubuntu:bookworm-22.04
            artifact-name: arm32
            build-options: "-Ponlylinuxarm32"
          - container: wpilib/aarch64-cross-ubuntu:bookworm-22.04
            artifact-name: arm64
            build-options: "-Ponlylinuxarm64"
    runs-on: ubuntu-22.04
    container: ${{ matrix.container }}
    env:
      releaseVersion: ${{ inputs.releaseVersion }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure git safe directory
        run: git config --global --add safe.directory /__w/${{ github.event.repository.name }}/${{ github.event.repository.name }}
      - name: Publish
        run: ./gradlew publish ${{ matrix.build-options }}
        working-directory: vendordep
      - uses: actions/upload-artifact@v4
        with:
          name: maven-${{ matrix.artifact-name }}
          path: vendordep/build/maven/

  build-host:
    name: Release - ${{ matrix.artifact-name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact-name: windows
            gradlew: ./gradlew.bat
          - os: macos-latest
            artifact-name: macos
            gradlew: ./gradlew
    runs-on: ${{ matrix.os }}
    env:
      releaseVersion: ${{ inputs.releaseVersion }}
    defaults:
      run:
        working-directory: vendordep
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Make gradlew executable
        if: runner.os != 'Windows'
        run: chmod +x gradlew
      - name: Install doxygen (Windows)
        if: runner.os == 'Windows'
        run: choco install doxygen.install -y
      - name: Install doxygen (macOS)
        if: runner.os == 'macOS'
        run: brew install doxygen
      - uses: gradle/actions/setup-gradle@v4
      - name: Publish
        run: ${{ matrix.gradlew }} publish -Pbuildalldesktop
      - uses: actions/upload-artifact@v4
        with:
          name: maven-${{ matrix.artifact-name }}
          path: vendordep/build/maven/

  release:
    name: Release - Linux (publish)
    needs: [build-cross, build-host]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
      pages: write
      deployments: read
      id-token: write
    env:
      releaseVersion: ${{ inputs.releaseVersion }}
      workingDirectory: ${{ github.workspace }}/vendordep
    environment:
      name: github-pages
    steps:
      - run: git config --global user.name "thenetworkgrinch" && git config --global user.email "thenetworkgrinch@noreply.users.github.com"

      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - run: chmod +x gradlew
        working-directory: ${{ env.workingDirectory }}

      - name: Install doxygen and graphviz
        run: sudo apt-get install -y doxygen graphviz

      - uses: gradle/actions/setup-gradle@v4

      - name: Download cross-platform maven artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: maven-*
          path: cross/
          merge-multiple: false

      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: ${{ env.workingDirectory }}/build/maven/

      - name: Merge cross-platform artifacts into maven
        run: |
          for dir in cross/maven-*/; do
            cp -r "$dir." vendordep/build/maven/
          done

      - name: Build and publish (Linux — fixes maven metadata)
        run: ./gradlew publish
        working-directory: ${{ env.workingDirectory }}

      - name: Create versioned vendordep JSON
        run: cp ${{ env.workingDirectory }}/build/maven/yams.json ${{ env.workingDirectory }}/build/maven/yams-${{ inputs.releaseVersion }}.json

      - name: Push to gh-pages
        run: git add . && git commit -m "Automatically add YAMS version ${{ inputs.releaseVersion }}" && git push
        working-directory: ${{ env.workingDirectory }}/build/maven/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v4
        with:
          name: github-pages
          retention-days: '90'
          path: ${{ env.workingDirectory }}/build/maven/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Output Pages Tree
        run: find ${{ env.workingDirectory }}/build/maven/ -type f

      - name: Create Vendor JSON Repo PR
        if: ${{ inputs.publish == true }}
        uses: wpilibsuite/vendor-json-repo/.github/actions/add_vendordep@main
        with:
          repo: Yet-Another-Software-Suite/vendor-json-repo
          token: ${{ secrets.PUBLISH_VENDOR_JSON_TOKEN }}
          vendordep_file: ${{ env.workingDirectory }}/build/maven/yams-${{ inputs.releaseVersion }}.json
          pr_title: "Automatically add YAMS version ${{ inputs.releaseVersion }}"
          pr_branch: "publish_yams_${{ inputs.releaseVersion }}"
        continue-on-error: true
